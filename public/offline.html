<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viden — Sin conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0D1A; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .logo { width: 80px; height: 80px; background: #4F46E5; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; margin-bottom: 24px; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #8B8BA0; font-size: 16px; margin-bottom: 32px; line-height: 1.6; }
    button { background: #4F46E5; color: white; border: none; border-radius: 12px; padding: 14px 28px; font-size: 16px; cursor: pointer; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1E1E35; border-top-color: #4F46E5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">V</div>
  <div class="spinner"></div>
  <h1>Sin conexión</h1>
  <p>Viden necesita internet para funcionar.<br>Verifica tu conexión e intenta de nuevo.</p>
  <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
